[project]
name = "wenyi-cli"
version = "0.2.0"
description = "文译命令行（本地文件模式，零基础设施）"
requires-python = ">=3.10"
dependencies = [
    "wenyi-core",
    "typer>=0.12",
    "rich>=13.7",
]

[project.scripts]
trans-novel = "wenyi_cli.main:main"

[tool.uv.sources]
wenyi-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["wenyi_cli"]
