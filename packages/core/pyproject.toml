[project]
name = "wenyi-core"
version = "0.2.0"
description = "文译翻译内核：多 Agent 协同长篇小说翻译（多语言 → 中文），存储/事件抽象化"
requires-python = ">=3.10"
dependencies = [
    "openai>=1.40",
    "pydantic>=2.7",
    "pyyaml>=6.0",
    "tenacity>=8.2",
    "beautifulsoup4>=4.12",
    "lxml>=5.0",
    "ebooklib>=0.18",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["wenyi_core"]
